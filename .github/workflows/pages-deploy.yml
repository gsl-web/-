# 这是 GitHub 官方推荐的 Pages 部署流程，绝对稳定
name: Build and Deploy GitHub Pages

on:
  # 只有在推送 main 分支时才触发
  push:
    branches: [ main ]

# 给 Actions 足够的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取完整历史，否则 mkdocs 会报错

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: 构建 MkDocs 站点
        run: mkdocs build --clean

      - name: 上传站点 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/ # mkdocs 构建输出的默认目录

  # 部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4